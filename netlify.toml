[build]
  command = "npm install && node build.js"
  publish = "."

[[redirects]]
  from = "/wp-admin/*"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug/"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/blog/"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
